<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Đăng Nhập Hệ Thống - HR CLOUD</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f172a",
                        "accent": "#0ea5e9"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>

<body class="bg-slate-50 dark:bg-slate-950 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Abstract Background Orbs -->
    <div class="absolute top-0 -left-20 w-96 h-96 bg-sky-500/10 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute bottom-0 -right-20 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl animate-pulse"
        style="animation-delay: 2s;"></div>

    <div
        class="w-full max-w-[1000px] grid grid-cols-1 lg:grid-cols-2 bg-white dark:bg-slate-900 rounded-[40px] shadow-2xl overflow-hidden border border-slate-100 dark:border-slate-800 animate-in">
        <!-- Left: Image/Brand Section -->
        <div class="hidden lg:flex flex-col justify-between p-12 bg-slate-900 text-white relative">
            <div class="absolute inset-0 opacity-20 pointer-events-none">
                <div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20">
                </div>
                <div class="absolute top-0 right-0 w-full h-full bg-gradient-to-br from-sky-500/40 to-transparent">
                </div>
            </div>

            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-10">
                    <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center">
                        <span class="material-icons-round text-white">shield</span>
                    </div>
                    <span class="text-xl font-black tracking-tighter uppercase">HR Cloud</span>
                </div>
                <h2 class="text-5xl font-black leading-tight tracking-tighter">Hệ thống Quản trị <br />Nhân sự & Lương
                    <br /><span class="text-sky-500 underline decoration-sky-500/30">Cấp cao</span>
                </h2>
            </div>

            <div class="relative z-10">
                <div class="flex items-center gap-4 p-4 bg-white/5 border border-white/10 rounded-3xl backdrop-blur-md">
                    <div class="flex -space-x-2">
                        <img class="w-8 h-8 rounded-full border-2 border-slate-900"
                            src="https://ui-avatars.com/api/?name=Admin&background=0ea5e9&color=fff" />
                        <img class="w-8 h-8 rounded-full border-2 border-slate-900"
                            src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" />
                    </div>
                    <p class="text-xs font-bold text-slate-400 tracking-tight uppercase">+2,400 Nhân viên đang sử dụng
                    </p>
                </div>
            </div>
        </div>

        <!-- Right: Login Form -->
        <div class="p-8 lg:p-16 flex flex-col justify-center">
            <div class="mb-10 lg:hidden text-center">
                <div
                    class="inline-flex w-12 h-12 bg-sky-500 rounded-2xl items-center justify-center text-white mb-4 shadow-lg shadow-sky-500/20">
                    <span class="material-icons-round">shield</span>
                </div>
                <h1 class="text-2xl font-black text-slate-900 dark:text-white uppercase tracking-tighter">HR Cloud</h1>
            </div>

            <div class="mb-10">
                <h3 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Chào mừng trở lại!</h3>
                <p class="text-slate-500 font-medium mt-2">Đăng nhập bằng tài khoản công việc được cấp.</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Email công
                        việc</label>
                    <div class="relative group">
                        <span
                            class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-sky-500 transition-colors text-lg">alternate_email</span>
                        <input id="email"
                            class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl py-4 flex-1 text-sm font-black focus:ring-2 focus:ring-sky-500 transition-all pl-12"
                            placeholder="admin@syshr.com" required type="email" />
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mật khẩu</label>
                        <a href="#"
                            class="text-[10px] font-black text-sky-500 hover:text-sky-600 uppercase tracking-widest">Quên?</a>
                    </div>
                    <div class="relative group">
                        <span
                            class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-sky-500 transition-colors text-lg">lock</span>
                        <input id="password"
                            class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl py-4 flex-1 text-sm font-black focus:ring-2 focus:ring-sky-500 transition-all pl-12"
                            placeholder="••••••••" required type="password" />
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit"
                        class="w-full bg-sky-500 hover:bg-sky-600 text-white rounded-2xl py-5 font-black text-sm tracking-widest shadow-xl shadow-sky-500/30 transition-all flex items-center justify-center gap-3 group">
                        BẮT ĐẦU LÀM VIỆC
                        <span
                            class="material-icons-round text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </button>
                </div>
            </form>

            <div class="mt-12 text-center border-t border-slate-50 dark:border-slate-800 pt-8">
                <div class="flex items-center justify-center gap-4 text-slate-400">
                    <p class="text-[9px] font-black uppercase tracking-widest">Security Internal v2.5</p>
                    <span class="w-1 h-1 rounded-full bg-slate-300"></span>
                    <p class="text-[9px] font-black uppercase tracking-widest">SSL Encrypted</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('user', JSON.stringify(result.data.user));

                    // Fetch full info with permissions before redirecting
                    const meResp = await fetch('/api/auth/me', {
                        headers: { 'Authorization': `Bearer ${result.data.token}` }
                    });
                    const meData = await meResp.json();

                    if (meData.success) {
                        localStorage.setItem('user', JSON.stringify(meData.data));
                        localStorage.setItem('permissions', JSON.stringify(meData.data.permissions || []));

                        const perms = meData.data.permissions || [];
                        const role = meData.data.role_name;

                        // Landing page logic based on permissions
                        if (role === 'boss' || perms.includes('dashboard.view')) {
                            window.location.href = '/admin';
                        } else {
                            // Find first accessible administrative page
                            const landingMap = [
                                { p: 'employee.view', path: '/employees.html' },
                                { p: 'attendance.view', path: '/attendance' },
                                { p: 'payroll.view', path: '/payroll' },
                                { p: 'leave.view', path: '/leave.html' }
                            ];

                            const firstMatch = landingMap.find(m => perms.includes(m.p));
                            if (firstMatch) {
                                window.location.href = firstMatch.path;
                            } else {
                                window.location.href = '/portal.html';
                            }
                        }
                    }
                } else {
                    alert(result.message || 'Sai thông tin đăng nhập');
                }
            } catch (err) {
                console.error(err);
                alert('Lỗi kết nối máy chủ');
            }
        });

        // Auto redirect if already logged in
        if (localStorage.getItem('token') && localStorage.getItem('user')) {
            const user = JSON.parse(localStorage.getItem('user'));
            const perms = JSON.parse(localStorage.getItem('permissions') || '[]');

            if (user.role_name === 'boss' || perms.includes('dashboard.view')) {
                window.location.href = '/admin';
            } else {
                window.location.href = '/portal.html';
            }
        }
    </script>
</body>

</html>
