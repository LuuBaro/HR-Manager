<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cấu Hình Lương - HR ADMIN</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f172a",
                        "accent": "#0ea5e9"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>

<body>
    <div
        class="security-gradient text-white px-6 py-2 flex justify-between items-center text-[11px] uppercase tracking-widest font-bold fixed top-0 w-full z-50">
        <div class="flex items-center gap-2">
            <span class="material-icons-round text-sm text-red-500">gpp_maybe</span>
            <span>Truy cập nội bộ nghiêm ngặt | 内部访问</span>
        </div>
        <div class="flex items-center gap-4">
            <span class="opacity-70">Lần đăng nhập cuối: 24/05/2024 08:30 AM</span>
            <span class="bg-red-500/20 text-red-500 px-2 py-0.5 rounded border border-red-500/30">Mã hóa SSL: Hoạt
                động</span>
        </div>
    </div>

    <!-- Layout Container -->
    <div class="flex pt-8">
        <!-- Sidebar will be injected here -->
        <div id="sidebar-root"></div>

        <div class="flex-1 ml-64 min-h-screen flex flex-col">
            <!-- Header will be injected here -->
            <div id="header-root"></div>

            <main class="p-8 max-w-7xl mx-auto w-full">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900 dark:text-white tracking-tight">Cấu hình thang bảng
                            lương</h1>
                        <p class="text-slate-500 text-sm mt-1">Thiết lập các tham số tính lương, phụ cấp và khấu trừ.
                        </p>
                    </div>
                    <button class="btn-primary">
                        <span class="material-icons-round text-sm">save</span> Lưu cấu hình
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Config Section 1 -->
                    <div class="card p-6">
                        <h3 class="text-lg font-bold mb-6 flex items-center gap-2 border-l-4 border-sky-500 pl-3">Tham
                            số cơ bản</h3>
                        <div class="space-y-6">
                            <div class="space-y-2">
                                <label class="text-xs font-semibold text-slate-500 uppercase">Ngày chốt công hàng
                                    tháng</label>
                                <input class="input-field" type="number" value="25" />
                                <p class="text-[10px] text-slate-400 italic">* Ngày kết thúc chu kỳ chấm công để tính
                                    lương.</p>
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-semibold text-slate-500 uppercase">Thuế TNCN (%)</label>
                                <input class="input-field" type="number" value="10" />
                            </div>
                        </div>
                    </div>

                    <!-- Config Section 2 -->
                    <div class="card p-6">
                        <h3 class="text-lg font-bold mb-6 flex items-center gap-2 border-l-4 border-sky-500 pl-3">Bảo
                            hiểm & Phúc lợi</h3>
                        <div class="space-y-6">
                            <div class="space-y-2">
                                <label class="text-xs font-semibold text-slate-500 uppercase">Tỉ lệ đóng BHXH
                                    (%)</label>
                                <input class="input-field" type="number" value="8" />
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-semibold text-slate-500 uppercase">Tỉ lệ đóng BHYT
                                    (%)</label>
                                <input class="input-field" type="number" value="1.5" />
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
