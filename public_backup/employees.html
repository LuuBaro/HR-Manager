<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Chi Tiết Nhân Viên - HR ADMIN</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f172a",
                        "accent": "#0ea5e9"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>

<body>
    <div
        class="security-gradient text-white px-6 py-2 flex justify-between items-center text-[11px] uppercase tracking-widest font-bold fixed top-0 w-full z-50">
        <div class="flex items-center gap-2">
            <span class="material-icons-round text-sm text-red-500">gpp_maybe</span>
            <span>Truy cập nội bộ nghiêm ngặt | 内部访问</span>
        </div>
        <div class="flex items-center gap-4">
            <span class="opacity-70">Lần đăng nhập cuối: 24/05/2024 08:30 AM</span>
            <span class="bg-red-500/20 text-red-500 px-2 py-0.5 rounded border border-red-500/30">Mã hóa SSL: Hoạt
                động</span>
        </div>
    </div>

    <!-- Layout Container -->
    <div class="flex pt-8">
        <!-- Sidebar will be injected here -->
        <div id="sidebar-root"></div>

        <div class="flex-1 ml-64 min-h-screen flex flex-col">
            <!-- Header will be injected here -->
            <div id="header-root"></div>

            <main class="p-8 max-w-7xl mx-auto w-full">
                <!-- Employee Detail Header -->
                <div id="employee-header" class="card p-6 mb-6">
                    <div class="flex flex-col md:flex-row gap-6 items-start md:items-center">
                        <div class="relative">
                            <div
                                class="w-32 h-32 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center border-4 border-white dark:border-slate-800 shadow-sm overflow-hidden">
                                <img id="detail-avatar" alt="Avatar" class="w-full h-full object-cover"
                                    src="https://via.placeholder.com/150" />
                            </div>
                            <button
                                class="absolute -bottom-2 -right-2 bg-sky-500 text-white p-2 rounded-full shadow-lg hover:bg-sky-600 transition-all">
                                <span class="material-icons-round text-sm">edit</span>
                            </button>
                        </div>
                        <div class="flex-1 space-y-2">
                            <div class="flex flex-wrap items-center gap-3">
                                <h1 id="detail-name" class="text-2xl font-bold text-slate-900 dark:text-white">...</h1>
                                <span id="detail-status"
                                    class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">...</span>
                            </div>
                            <div
                                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 text-sm text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-2">
                                    <span class="material-icons-round text-base">badge</span>
                                    <span id="detail-code">ID: ...</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="material-icons-round text-base">corporate_fare</span>
                                    <span id="detail-dept">Phòng ban: ...</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="material-icons-round text-base">email</span>
                                    <span id="detail-email">...</span>
                                </div>
                                <div class="flex items-center gap-2 text-sky-500 font-medium">
                                    <span class="material-icons-round text-base">calendar_today</span>
                                    <span id="detail-hire-date">Tham gia: ...</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button class="btn-secondary">
                                <span class="material-icons-round text-sm">download</span> Xuất file
                            </button>
                            <button onclick="saveEmployee()" class="btn-primary">
                                <span class="material-icons-round text-sm">save</span> Lưu hồ sơ
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="border-b border-slate-200 dark:border-slate-800 flex overflow-x-auto custom-scrollbar mb-6">
                    <button
                        class="px-6 py-4 border-b-2 border-sky-500 text-sky-500 font-semibold text-sm whitespace-nowrap flex items-center gap-2">
                        <span class="material-icons-round text-sm">person</span> Thông tin cá nhân
                    </button>
                    <button
                        class="px-6 py-4 border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 font-medium text-sm whitespace-nowrap flex items-center gap-2 transition-all">
                        <span class="material-icons-round text-sm">description</span> Hợp đồng
                    </button>
                    <button
                        class="px-6 py-4 border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 font-medium text-sm whitespace-nowrap flex items-center gap-2 transition-all">
                        <span class="material-icons-round text-sm">health_and_safety</span> Bảo hiểm & Phúc lợi
                    </button>
                    <button
                        class="px-6 py-4 border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 font-medium text-sm whitespace-nowrap flex items-center gap-2 transition-all">
                        <span class="material-icons-round text-sm">history</span> Lịch sử thay đổi
                    </button>
                </div>

                <!-- Personal Info Form -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="card p-6">
                            <h3 class="text-lg font-bold mb-6 flex items-center gap-2 border-l-4 border-sky-500 pl-3">
                                Thông tin cơ bản</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-xs font-semibold text-slate-500 uppercase">Họ và tên</label>
                                    <input id="form-name" class="input-field" type="text" />
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-semibold text-slate-500 uppercase">Tên tiếng Trung (nếu
                                        có)</label>
                                    <input id="form-name-zh" class="input-field" type="text" />
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-semibold text-slate-500 uppercase">Email công
                                        việc</label>
                                    <input id="form-email" class="input-field" type="email" />
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-semibold text-slate-500 uppercase">Số điện thoại</label>
                                    <input id="form-phone" class="input-field" type="text" />
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-semibold text-slate-500 uppercase">Số CCCD / Hộ
                                        chiếu</label>
                                    <input id="form-id-number" class="input-field" type="text" />
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-semibold text-slate-500 uppercase">Ngày sinh</label>
                                    <input id="form-dob" class="input-field" type="date" />
                                </div>
                                <div class="md:col-span-2 space-y-2">
                                    <label class="text-xs font-semibold text-slate-500 uppercase">Địa chỉ thường
                                        trú</label>
                                    <textarea id="form-address" class="input-field" rows="2"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <!-- Extra info cards -->
                        <div class="card p-6">
                            <h3 class="text-sm font-bold mb-4 uppercase text-slate-400 flex items-center gap-2">
                                <span class="material-icons-round text-base">health_and_safety</span> Bảo hiểm
                            </h3>
                            <div class="space-y-4">
                                <div
                                    class="p-3 bg-sky-50 dark:bg-sky-900/10 border border-sky-100 dark:border-sky-900/20 rounded-lg">
                                    <p class="text-[10px] text-sky-500 font-bold uppercase mb-1">Số sổ BHXH</p>
                                    <p id="detail-insurance" class="text-lg font-mono font-bold text-sky-500">...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const employeeId = urlParams.get('id');

        async function loadEmployee() {
            if (!employeeId) {
                // Redirect to list or show list
                console.log('No employee ID provided');
                return;
            }

            try {
                const response = await fetch(`/api/employees/${employeeId}`);
                const data = await response.json();
                if (data.success) {
                    const emp = data.data;
                    renderEmployee(emp);
                }
            } catch (error) {
                console.error('Error loading employee:', error);
            }
        }

        function renderEmployee(emp) {
            document.getElementById('detail-name').textContent = `${emp.full_name} ${emp.full_name_zh ? '/ ' + emp.full_name_zh : ''}`;
            document.getElementById('detail-avatar').src = emp.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(emp.full_name)}&background=0ea5e9&color=fff`;
            document.getElementById('detail-code').textContent = `ID: ${emp.employee_code}`;
            document.getElementById('detail-dept').textContent = `Phòng ban: ${emp.department_name || 'N/A'}`;
            document.getElementById('detail-email').textContent = emp.email || 'N/A';
            document.getElementById('detail-hire-date').textContent = `Tham gia: ${App.formatDate(emp.hire_date)}`;

            const statusEl = document.getElementById('detail-status');
            statusEl.textContent = emp.status === 'active' ? 'Đang làm việc' : 'Đã nghỉ';
            statusEl.className = `px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${emp.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;

            // Form
            document.getElementById('form-name').value = emp.full_name || '';
            document.getElementById('form-name-zh').value = emp.full_name_zh || '';
            document.getElementById('form-email').value = emp.email || '';
            document.getElementById('form-phone').value = emp.phone || '';
            document.getElementById('form-id-number').value = emp.id_number || '';
            document.getElementById('form-dob').value = emp.date_of_birth ? emp.date_of_birth.substring(0, 10) : '';
            document.getElementById('form-address').value = emp.address || '';
            document.getElementById('detail-insurance').textContent = emp.social_insurance_number || 'Chưa cập nhật';
        }

        async function saveEmployee() {
            const payload = {
                full_name: document.getElementById('form-name').value,
                full_name_zh: document.getElementById('form-name-zh').value,
                email: document.getElementById('form-email').value,
                phone: document.getElementById('form-phone').value,
                id_number: document.getElementById('form-id-number').value,
                date_of_birth: document.getElementById('form-dob').value,
                address: document.getElementById('form-address').value,
            };

            try {
                const response = await fetch(`/api/employees/${employeeId}`, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (data.success) {
                    alert('Lưu thành công!');
                    loadEmployee();
                }
            } catch (error) {
                alert('Có lỗi xảy ra khi lưu dữ liệu');
            }
        }

        document.addEventListener('DOMContentLoaded', loadEmployee);
    </script>
</body>

</html>
